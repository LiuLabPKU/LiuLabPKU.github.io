   Title: "Regulation of gene expression by N6-methyladenosine in cancer"
   Journal: "Trends in Cell Biology"
   DOI: "10.1016/j.tcb.2019.02.008"
   Abstract: "As the most abundant mRNA modification in eukaryotic cells, N6-methyladenosine (m6A) has recently emerged as an important regulator of gene expression. m6A modification can be deposited by m6A methyltransferases, removed by m6A demethylases, and recognized by different reader proteins. Numerous lines of evidence have shown that m6A methylation plays critical roles regulating gene expression in development and disease. In this review, we summarize the molecular and cellular function of m6A and highlight some key results which demonstrate the role of m6A in various cancers. Finally, we discuss future directions for research into m6A and its effects in cancer and the potential for targeting RNA modification in cancer treatment."
