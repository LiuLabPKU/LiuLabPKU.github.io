   Title: "Genetically encoded copper(I) reporters with improved response for use in imaging"
   Journal: "Journal of the American Chemical Society"
   DOI: "10.1021/ja3106779"
   Abstract: "Copper represents one of the most important biological metal ions due to its role as a catalytic cofactor in a multitude of proteins. However, an excess of copper is highly toxic. Thus, copper is heavily regulated, and copper homeostasis is controlled by many metalloregulatory proteins in various organisms. Here we report a genetically encoded copper(I) probe capable of monitoring copper fluctuations inside living cells. We insert the copper regulatory protein Ace1 into a yellow fluorescent protein, which selectively binds copper(I) and generates improved copper(I) probes."
