   Abstract: "External stressors, particularly heat stress, induce DNA damage and genomic instability in cells. However, the mechanisms by which cells rapidly respond to such DNA damage remain largely unknown. In this study, we found that heat shock factor 1 (HSF1), the major transcription factor in the heat shock response, activated several non-homologous end joining (NHEJ) pathway-associated genes, particularly NHEJ1, through puncta formation, thereby maintaining the stability of NHEJ pathway and alleviating the repair burden of DNA double-strand breaks caused by heat stress."
