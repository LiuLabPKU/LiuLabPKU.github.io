   Abstract: "Understanding cellular functions in health and disease requires dissecting spatiotemporal variations in the subcellular transcriptome. Existing methods for mitochondrial RNA profiling suffer from limitations, including low resolution, contamination and dependence on genetic manipulation. Here we present a bioorthogonal photocatalytic labelling and sequencing strategy (CAT-seq) that enables high-resolution, in situ profiling of mitochondrial RNA in living cells without genetic manipulation."
