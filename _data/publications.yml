   Title: "ALKBH5 is a mammalian RNA demethylase that impacts RNA metabolism and mouse fertility"
   Journal: "Molecular Cell"
   DOI: "10.1016/j.molcel.2012.10.015"
   Abstract: "N6-methyladenosine (m6A) is the most prevalent internal modification of messenger RNA (mRNA) in higher eukaryotes. Here we report ALKBH5 as another mammalian demethylase that oxidatively reverses m6A in mRNA in vitro and in vivo. This demethylation activity of ALKBH5 significantly affects mRNA export and RNA metabolism as well as the assembly of mRNA processing factors in nuclear speckles. Alkbh5-deficient male mice have increased m6A in mRNA and are characterized by impaired fertility resulting from apoptosis that affects meiotic metaphase-stage spermatocytes. In accordance with this defect, we have identified in mouse testes 1,551 differentially expressed genes that cover broad functional categories and include spermatogenesis-related mRNAs involved in the p53 functional interaction network. The discovery of this RNA demethylase strongly suggests that the reversible m6A modification has fundamental and broad functions in mammalian cells."
