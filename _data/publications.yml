   Title: "Metal-driven hierarchical self-assembled one-dimensional nanohelices"
   Journal: "Nano Letters"
   DOI: "10.1021/nl9028335"
   Abstract: "Sophisticated helical structure has been an attractive subject due to its significance in understanding of biological self-assembly and appealing application in nanoscience. In this work, a facile route toward one-dimensional helical nanostructure is presented based on metal-cholate supramolecular self-assembly. Well-defined right-handed helical nanoribbons in calcium-cholate systems are systematically investigated and a series of metal ions are exploited to drive metal-cholate supramolecular helix. It is anticipated that the incorporation of metal ions may endow versatile functionalities and merits to the self-assembled nanohelices. Particularly helical inorganic nanomaterials (i.e., SiO2 and ZnS) have been prepared based on metal-cholate supramolecular nanohelix via two distinct templating strategies."
