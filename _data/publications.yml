   Title: "Structural insights into FTO’s catalytic mechanism for the demethylation of multiple RNA substrates"
   Journal: "Proceedings of the National Academy of Sciences"
   DOI: "10.1073/pnas.1820574116"
   Abstract: "FTO demethylates internal N6-methyladenosine (m6A) and N6,2′-O-dimethyladenosine (m6Am; at the cap +1 position) in mRNA, m6A and m6Am in snRNA, and N1-methyladenosine (m1A) in tRNA in vivo, and in vitro evidence supports that it can also demethylate N6-methyldeoxyadenosine (6mA), 3-methylthymine (3mT), and 3-methyluracil (m3U). However, it remains unclear how FTO variously recognizes and catalyzes these diverse substrates. Here we demonstrate—in vitro and in vivo—that FTO has extensive demethylation enzymatic activity on both internal m6A and cap m6Am. Considering that 6mA, m6A, and m6Am all share the same nucleobase, we present a crystal structure of human FTO bound to 6mA-modified ssDNA, revealing the molecular basis of the catalytic demethylation of FTO toward multiple RNA substrates. We discovered that (i) N6-methyladenine is the most favorable nucleobase substrate of FTO, (ii) FTO displays the same demethylation activity toward internal m6A and m6Am in the same RNA sequence, suggesting that the substrate specificity of FTO primarily results from the interaction of residues in the catalytic pocket with the nucleobase (rather than the ribose ring), and (iii) the sequence and the tertiary structure of RNA can affect the catalytic activity of FTO. Our findings provide a structural basis for understanding the catalytic mechanism through which FTO demethylates its multiple substrates and pave the way forward for the structure-guided design of selective chemicals for functional studies and potential therapeutic applications."
