   Title: "DNA 5-methylcytosine-specific amplification and sequencing"
   Journal: "Journal of the American Chemical Society"
   DOI: "10.1021/jacs.9b12707"
   Abstract: "DNA 5-methylcytosine (5mC)-specific mapping has been hampered by severe DNA degradation and the presence of 5-hydroxymethylcytosine (5hmC) using the conventional bisulfite sequencing approach. Here, we present a 5mC-specific whole-genome amplification method (5mC-WGA), with which we achieved 5mC retention during DNA amplification from limited input down to 10 pg scale with limited interference from 5hmC signals, providing DNA 5mC methylome with high reproducibility and accuracy."
