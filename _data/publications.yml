   Abstract: "Although N6-methyladenosine (m6A) is a pervasive RNA modification essential for gene regulation, dissecting the functions of individual m6A sites remains technically challenging. To overcome this, we developed functional m6A sites detection by CRISPR-dCas13b-FTO screening (FOCAS), a CRISPR-dCas13b-based platform enabling high-throughput, site-specific functional screening of m6A. Applying FOCAS to four human cancer cell lines identified 4,475 m6A-regulated genes influencing cell fitness via both mRNAs and non-coding RNAs (ncRNAs), many of which are newly linked to cancer and exhibit dynamic developmental expression."
