    - "2024 北京大学东宝奖教金"
    - "2022 国家优秀青年科学基金（海外）"
    - "2022 拜尔学者"
    - "2022 北京大学博雅青年学者"
    - "2021 億方学者"
    - "2021 北京市科技新星"
