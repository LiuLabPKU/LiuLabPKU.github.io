- name: "Liu Jun (刘君)"
  title: "PI — 北京大学生命科学学院研究员、北大-清华生命科学联合中心研究员、北京大学核糖核酸北京研究中心研究员、博士生导师"
  email: "junliu1223@pku.edu.cn"
  description: "本科和博士毕业于北京大学化学院，随后于美国芝加哥大学从事博士后研究。主要研究RNA表观转录的分子机制与生物学功能，致力于阐释RNA修饰和非编码RNA调控染色质功能的分子基础，揭示特定调控事件在细胞命运决定中的生理意义，并探索以RNA修饰为靶点的疾病干预策略。相关研究以第一（共同）、通讯（共同）作者身份发表在Cell (2024)、Science (2020)、Nature (2019)、Nature Neurosciences (2023)、Nature Cell Biology (2018)等国际学术期刊。"
  education:
    - "2006-2010 北京大学化学与分子工程学院 理学学士"
    - "2010-2015 北京大学化学与分子工程学院 化学生物学 理学博士"
    - "2015.11-2020.8 美国芝加哥大学化学系 博士后"
    - "2020.10-至今 北京大学生命科学学院 助理教授"
