- date: "2026-04-29"
  slug: "2026-04-29-nar"
  title: "祝贺丁文卿、邓启东、王天雨在《Nucleic Acids Research》发表研究成果"
  summary: "本实验室最新研究成果揭示了细胞在热应激条件下维持基因组稳定性的全新分子机制。研究发现HSF1与YTHDC1协同作用，共同增强热应激下的DNA双链断裂修复能力。丁文卿、邓启东、王天雨为论文共同第一作者，刘君研究员为通讯作者。"
  image: "assets/images/news/nar-2026.jpeg"

- date: "2026-04-28"
  slug: "2026-04-28-natcomm"
  title: "刘君研究员团队与合作者在《Nature Communications》发表研究成果"
  summary: "该研究题为\"Epitranscriptomic regulation of mRNA stability in pivotal transcription factors modulates the second cell fate decision\"，揭示了RNA表观转录组修饰通过调控关键转录因子的mRNA稳定性，在早期胚胎发育第二次细胞命运决定过程中发挥的重要作用。"
  image: "assets/images/news/natcomm-2026.png"

- date: "2026-01-05"
  slug: "2026-01-05-focas-cell"
  title: "刘君团队开发FOCAS平台实现m6A修饰位点的全转录组功能解析，研究成果发表于《Cell》"
  summary: "该研究建立了FOCAS方法，基于改造的CRISPR-dCas13b系统实现对特定m6A修饰位点的靶向去甲基化，在四种人类癌细胞系中系统鉴定出4,475个由m6A调控的功能基因。张薪泞、张艺凡、刘欣宇为论文共同第一作者，刘君研究员为通讯作者。"
  image: "assets/images/news/focas-cell-2026.png"

- date: "2025-11-05"
  slug: "2025-11-05-wurui"
  title: "热烈祝贺康自红同学荣获2025年度吴瑞奖学金！"
  summary: "吴瑞奖学金被誉为华人生命科学领域在读博士最高奖项。康自红同学首次揭示了肿瘤细胞中着丝粒重复序列RNA（cenRNA）存在高频m6A修饰，并发现CENPA可作为着丝粒区域m6A修饰的\"阅读器\"，相关研究成果发表于《Cell》杂志。"
  image: "assets/images/news/wurui-2025.jpg"

