  summary: "亚洲青年科学家基金项目（AYSF）正式公布2025年度12位研究员名单，其中生命科学领域共4位科学家入选。AYSF委员会表彰刘君研究员在细胞命运决定过程中发现染色质相关RNA（caRNA）m6A修饰的新分子机制方面所作出的贡献。"
  image: "assets/images/news/aysf-2025.jpg"

- date: "2025-06-12"
  slug: "2025-06-12-cellstemcell"
  title: "祝贺肖维德同学的研究成果在《Cell Stem Cell》发表"
  summary: "该研究揭示了L1PA转座子上的m6A修饰通过调控其转录本的稳定性，进而沉默LTR逆转录转座子并限制人原始态胚胎干细胞全能性的分子机制，为理解转座子调控和干细胞命运决定提供了新的见解。"
