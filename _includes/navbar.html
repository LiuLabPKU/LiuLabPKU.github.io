<nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation" id="navbar" style="background:#fff;">
    <div class="container">
        <div class="navbar-brand">
            <a class="navbar-item"
                href="{% if page.layout == 'default' %}{{site.url}}{{site.baseurl}}/#{% else %}{{site.url}}{{site.baseurl}}/{% endif %}">
                <strong style="color:#222;">{{site.title}}</strong>
            </a>
            <div class="navbar-burger" data-target="navbar-menu" style="color:#333;">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="navbar-menu" id="navbar-menu" style="background:#fff;">
            <div class="navbar-end">
                <a class="navbar-item {% if page.layout == 'default' %}is-active{% endif %}"
                    href="{% if page.layout == 'default' %}{{site.url}}{{site.baseurl}}/#{% else %}{{site.url}}{{site.baseurl}}/{% endif %}">HOME</a>
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/research">RESEARCH</a>
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/publications">PUBLICATIONS</a>
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/people">MEMBERS</a>
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/photos">PHOTOS</a>
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/news">NEWS</a>
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/join">JOIN US</a>
            </div>
        </div>
    </div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function () {
    var burgers = document.querySelectorAll('.navbar-burger');
    burgers.forEach(function (el) {
        el.addEventListener('click', function () {
            var target = document.getElementById(el.dataset.target);
            el.classList.toggle('is-active');
            target.classList.toggle('is-active');
        });
    });
});
</script>
