<section class="hero is-fullheight has-text-centered" id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-body">
    <div class="container">
      <div class="hero-logo-wrap">
        <img src="/assets/images/logo/logo_raw_heng_alpha0.png" alt="Liu Lab Logo">
      </div>
      <h1 class="title is-size-1 is-uppercase has-text-weight-bold hero-title">
        {{site.title}}
      </h1>
      <div class="hero-accent"></div>
      <h3 class="subtitle is-uppercase has-text-weight-medium is-marginless hero-subtitle">
        {{site.description}}
      </h3>
      <a href="{{site.url}}{{site.baseurl}}/#about"
        class="button is-rounded is-outlined is-uppercase has-text-weight-normal hero-cta"
        onclick="document.getElementById('about').scrollIntoView({behavior:'smooth'}); return false;">Explore Our Research</a>
    </div>
  </div>
</section>
